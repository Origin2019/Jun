<body class="about-page">
    <div class="top-banner">

    </div>

    <div class="carousel-container">
        <div class="carousel-track" id="track">
            <a href="http://xhslink.com/o/8MUJRVhjwbB" class="slide" target="_blank">
                <img src="static/轮播图1.webp" alt="1" loading="lazy>
                <div class="slide-text">世锦参赛名单出炉，确定参加</div>
            </a>

            <a href="http://xhslink.com/o/14SWIAFCoHt" class="slide" target="_blank">
                <img src="static/轮播图2.webp" alt="2" loading="lazy>
                <div class="slide-text">ig更新</div>
            </a>

            <a href="http://xhslink.com/o/6LILh208uoc" class="slide" target="_blank">
                <img src="static/轮播图3.webp" alt="3" loading="lazy>
                <div class="slide-text">提前一天归国采访</div>
            </a>
        </div>

        <div class="dots-container">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
        </div>
    </div>

    <div class="scroll-wrapper">
        <div class="scroll-container">
            <a href="introduction.html" class="info-card">
                <img src="static/card1.webp" alt="1" loading="lazy>
                <div class="card-desc">👤个人简介</div>
            </a>
            <a href="competition.html" class="info-card">
                <img src="static/card2.webp" alt="2" loading="lazy>
                <div class="card-desc">🥇比赛</div>
            </a>
            <a href="https://weibo.com/p/100808cdcc2059c709e828d8921caf7ac1683a/super_index?from=page_100808&mod=TAB#place" class="info-card" target="_blank">
                <img src="static/card3.webp" alt="3" loading="lazy>
                <div class="card-desc">🧣微博超话</div>
            </a>
            <a href="music.html" class="info-card">
                <img src="static/card4.webp" alt="4" loading="lazy>
                <div class="card-desc">🎵各赛季选曲</div>
            </a>
            <div class="info-card">
                <img src="static/card5.webp" alt="5" loading="lazy>
                <div class="card-desc">📅未来赛程</div>
            </div>
            <div class="info-card">
                <img src="static/card6.webp" alt="6" loading="lazy>
                <div class="card-desc">📺综艺</div>
            </div>
            <div class="info-card">
                <img src="static/card7.webp" alt="7" loading="lazy>
                <div class="card-desc">📽童星时期</div>
            </div>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        const track = document.getElementById('track');
        const dots = document.querySelectorAll('.dot');

        function updateSlide() {
            // 向左移动的距离：当前的索引 * 100%
            track.style.transform = `translateX(-${currentIndex * 100}%)`;

            // 更新小圆点的状态
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % 3; // 3 是图片数量，循环切换
            updateSlide();
        }

        // 设置每 5 秒 (5000 毫秒) 自动切换
        let timer = setInterval(nextSlide, 5000);

        // 点击圆点手动切换
        function currentSlide(index) {
            currentIndex = index;
            updateSlide();
            // 重置定时器，防止手动点击后立刻自动跳页
            clearInterval(timer);
            timer = setInterval(nextSlide, 5000);
        }
    </script>
</body>
