<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Junhwan Cha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
    <div class="card">
        <h1>⛸️ 你好，这里是Junhwan Cha ⛸️</h1>
        <p>点击开始</p>
        <div class="btn-group">
        <a href="about.html">
            <button class="cool-btn">进入</button>
        </a>
        <button class="cool-btn guide-btn" onclick="openModal()">新手指南</button>
    </div>
    </div>

    <div id="guideModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>网站功能指南</h2>
            <div class="guide-text">
                <p><strong>主页面：</strong> 包含选手的个人简介、新闻、比赛等，点击可跳转相应页面（首次打开可能会有点卡）。</p>
                <p><strong>个人简介：</strong> 鼠标放到泡泡上面可以查看选手的冷/热知识，点击中间的BIO跳转ISU官网选手介绍页。</p>
                <p><strong>比赛：</strong> 按赛季记录了从少年组至今的比赛，点击赛季展开本赛季比赛，点击比赛展开详细结果，分数带下划线的可以点击查看小分表，国内比赛的小分表链接为微博帖子，其中部分在帖子评论区。</p>
                <p><strong>选曲：</strong> 记录了历年短节目、自由滑及表演滑的选曲曲目。</p>
                <p><strong>微博超话：</strong> 点击跳转微博超话。</p>
                <p><strong>未来赛程、综艺、童星时期：</strong> 未实现，敬请期待。</p>
            </div>
            <button class="cool-btn" onclick="closeModal()">我知道了</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById("guideModal");

        function openModal() {
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        // 点击弹窗外部也可以关闭
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>

</html>
